name: Deploy Root Domain to Firebase Hosting
on:
    push:
        branches:
            - main

# Forces the older GitHub actions to run on Node 24 to clear the warning
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24" # Upgraded to Node 24

            - name: Install dependencies
              run: yarn install

            - name: Build project
              run: yarn build

            - name: Deploy to Firebase
              uses: FirebaseExtended/action-hosting-deploy@v0
              with:
                  repoToken: ${{ secrets.GITHUB_TOKEN }}
                  firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEPERFECTBARK_6FA05 }}
                  channelId: live
                  projectId: theperfectbark-6fa05

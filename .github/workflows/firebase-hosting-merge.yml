name: Deploy Root Domain to Firebase Hosting
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install packages using Yarn
      - name: Install dependencies
        run: yarn install

      # Build the Vite project (compiles your TypeScript to the 'dist' folder)
      - name: Build project
        run: yarn build

      # Deploy the 'dist' folder to Firebase
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEPERFECTBARK_6FA05 }}
          channelId: live
          projectId: theperfectbark-6fa05

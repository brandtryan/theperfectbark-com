<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Perfect Bark</title>
		<style>
			/* Basic CSS Reset */
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			/* Pure black background, center everything */
			body {
				background-color: #000000;
				color: #ffffff;
				font-family:
					system-ui,
					-apple-system,
					sans-serif;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				text-align: center;
			}

			/* Clean, white text */
			h1 {
				font-size: 2.5rem;
				font-weight: 400;
				letter-spacing: 0.05em;
			}
		</style>
	</head>
	<body>
		<h1>Tourettic Text is moving text.</h1>
	</body>
</html>
